name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 6
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "6.0.x"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: dotnet restore SoundBox.csproj

      - name: Build C++ DSP (Release|x64)
        run: msbuild DSP\SoundBoxDSP.vcxproj /p:Configuration=Release /p:Platform=x64

      - name: Build C# App
        run: dotnet build SoundBox.csproj -c Release --no-restore
