name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write          # Required for SignPath.io

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          VERSION_NUM="${VERSION#v}"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "VERSION_NUM=${VERSION_NUM}" >> $GITHUB_OUTPUT

      - name: Update Version.cs
        shell: pwsh
        run: |
          $content = Get-Content Version.cs -Raw
          $content = $content -replace 'public const string Current = ".*?"', "public const string Current = `"${{ steps.version.outputs.VERSION }}`""
          Set-Content Version.cs $content

      - name: Setup .NET 6
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "6.0.x"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: dotnet restore SoundBox.csproj

      - name: Build C++ DSP (Release|x64)
        run: msbuild DSP\SoundBoxDSP.vcxproj /p:Configuration=Release /p:Platform=x64

      - name: Publish C# App (Release)
        run: dotnet publish SoundBox.csproj -c Release -r win-x64 --self-contained -o publish

      - name: Copy native DLLs to publish
        shell: pwsh
        run: |
          # DSP DLL
          $dspPaths = @("DSP\x64\Release\SoundBoxDSP.dll", "x64\Release\SoundBoxDSP.dll")
          foreach ($p in $dspPaths) {
            if (Test-Path $p) { Copy-Item $p publish\; break }
          }
          # FFTW3 DLL
          if (Test-Path "DSP\lib\fftw3\libfftw3f-3.dll") {
            Copy-Item "DSP\lib\fftw3\libfftw3f-3.dll" publish\
          }

      - name: Create zip archive
        shell: pwsh
        run: Compress-Archive -Path publish\* -DestinationPath "SoundBox-${{ steps.version.outputs.VERSION }}-win-x64.zip"

      # --- Inno Setup Installer ---
      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          # Inno Setup is pre-installed on windows-latest at this path
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DAppVersion="${{ steps.version.outputs.VERSION_NUM }}" `
            installer\soundbox.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "SoundBox ${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          files: |
            SoundBox-${{ steps.version.outputs.VERSION }}-win-x64.zip
            installer-output/SoundBox-${{ steps.version.outputs.VERSION_NUM }}-setup.exe

      # --- SignPath.io Code Signing (uncomment after setup) ---
      # To enable:
      #   1. Sign up at https://signpath.io (free for OSS)
      #   2. Create organization & project
      #   3. Add GitHub Actions trusted build system
      #   4. Set repository secrets: SIGNPATH_ORGANIZATION_ID, SIGNPATH_PROJECT_SLUG,
      #      SIGNPATH_SIGNING_POLICY_SLUG, SIGNPATH_API_TOKEN
      #
      # - name: Sign installer with SignPath
      #   uses: signpath/github-action-submit-signing-request@v1
      #   with:
      #     api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
      #     organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
      #     project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
      #     signing-policy-slug: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
      #     artifact-configuration-slug: "installer"
      #     github-artifact-id: ${{ steps.upload.outputs.artifact-id }}
      #     wait-for-completion: true
